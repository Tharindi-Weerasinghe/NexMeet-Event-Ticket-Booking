<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NexMeet | Review Event</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">Nex<span>Meet</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/events-page">Events</a>
        <a href="/my-tickets">My Tickets</a>
        <a href="/profile">My Profile</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="form-box">
    <h1>Review Event</h1>

    <h3 th:text="${event.eventName}"></h3>

    <p>
        <strong>Location:</strong>
        <span th:text="${event.location}"></span>
    </p>

    <form th:action="@{/save-review/{id}(id=${event.id})}"
          th:object="${review}"
          method="post">

        <label>Rating</label>
        <select th:field="*{rating}">
            <option value="5">5 - Excellent</option>
            <option value="4">4 - Good</option>
            <option value="3">3 - Average</option>
            <option value="2">2 - Poor</option>
            <option value="1">1 - Bad</option>
        </select>
        <p class="error-text" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></p>

        <label>Comment</label>
        <textarea th:field="*{comment}" rows="4" placeholder="Write your review..."></textarea>
        <p class="error-text" th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}"></p>

        <button type="submit" class="btn">Submit Review</button>
    </form>

    <br>
    <a href="/my-tickets" class="btn btn-secondary">Back to My Tickets</a>
</div>

<div class="footer">
    <p>© 2026 NexMeet — Connecting People Through Events</p>
</div>

</body>
</html>

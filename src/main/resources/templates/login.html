<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NexMeet | Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">

<div class="auth-box">
    <div class="logo auth-logo">Nex<span>Meet</span></div>

    <h1 class="auth-heading">Login</h1>

    <div th:if="${param.error != null and param.error[0] == 'empty'}" class="error-box">
        Please enter both email and password.
    </div>

    <div th:if="${param.error != null and param.error[0] == 'invalid'}" class="error-box">
        Invalid email or password. Please try again.
    </div>

    <div th:if="${param.registered != null}" class="success-box">
        Registration successful. Please login.
    </div>

    <form action="/login" method="post">
        <label>Email</label>
        <input type="email" name="email">

        <label>Password</label>
        <input type="password" name="password">

        <button type="submit" class="btn auth-submit">Login</button>
    </form>

    <p class="auth-switch">
        New user?
        <a href="/register">Create account</a>
    </p>
</div>

</body>
</html>

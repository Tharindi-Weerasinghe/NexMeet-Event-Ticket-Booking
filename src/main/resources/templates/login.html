<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NexMeet | Login</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">Nex<span>Meet</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/events-page">Events</a>
        <a href="/register">Register</a>
    </div>
</div>

<main class="auth-page">
    <div class="form-box auth-box">
        <div class="auth-heading">
            <h1>Welcome Back</h1>
            <p>Log in to manage your tickets and bookings.</p>
        </div>

        <div th:if="${param.error != null}" class="error-box">
            Invalid email or password. Please try again.
        </div>

        <div th:if="${param.registered != null}" class="success-box">
            Registration successful. Please log in.
        </div>

        <form action="/login" method="post">
            <label for="email">Email Address</label>
            <input id="email"
                   type="email"
                   name="email"
                   placeholder="Enter your email"
                   autocomplete="email"
                   required>

            <label for="password">Password</label>
            <input id="password"
                   type="password"
                   name="password"
                   placeholder="Enter your password"
                   autocomplete="current-password"
                   required>

            <button type="submit" class="btn auth-submit">
                Login
            </button>
        </form>

        <p class="auth-switch">
            New to NexMeet?
            <a href="/register">Create an account</a>
        </p>
    </div>
</main>

</body>
</html>

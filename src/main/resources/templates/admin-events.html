<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NexMeet | Manage Events</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">Nex<span>Meet</span></div>

    <div class="nav-links">
        <a href="/admin">Dashboard</a>
        <a href="/add-event">Add Event</a>
        <a href="/bookings-page">Bookings</a>
        <a href="/">Customer Website</a>
    </div>
</div>

<div class="container">
    <h1>Manage Events</h1>

    <div class="event-grid">
        <div class="event-card" th:each="event : ${events}">

            <img th:src="${event.imageUrl}"
                 class="event-img"
                 alt="Event Image">

            <h2 th:text="${event.eventName}"></h2>

            <p th:text="${event.location}"></p>

            <p class="price">
                Rs. <span th:text="${event.ticketPrice}"></span>
            </p>

            <div class="event-actions">
                <a th:href="@{/edit-event/{id}(id=${event.id})}"
                   class="btn btn-secondary">
                    Edit
                </a>

                <a th:href="@{/delete-event/{id}(id=${event.id})}"
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this event?')">
                    Delete
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NexMeet | Register</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">

<div class="auth-box">
    <div class="logo auth-logo">Nex<span>Meet</span></div>

    <h1 class="auth-heading">Create Account</h1>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <label>Name</label>
        <input type="text" th:field="*{name}">
        <p class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>

        <label>Email</label>
        <input type="email" th:field="*{email}">
        <p class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

        <label>Password</label>
        <input type="password" th:field="*{password}">
        <p class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

        <button type="submit" class="btn auth-submit">Register</button>
    </form>

    <p class="auth-switch">
        Already have an account?
        <a href="/login">Login</a>
    </p>
</div>

</body>
</html>
